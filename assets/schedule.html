<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reserva de Hotel | Disponibilidade</title>
    <style>
      /* --- CSS (Estilos) --- */
      :root {
        --primary-color: #2c3e50;
        --accent-color: #e67e22;
        --bg-color: #f4f7f6;
        --text-color: #333;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        margin: 0;
        padding: 20px;
        color: var(--text-color);
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
      }

      h1 {
        text-align: center;
        color: var(--primary-color);
        margin-bottom: 30px;
      }

      /* Área de Busca */
      .search-box {
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        justify-content: space-between;
        align-items: end;
      }

      .input-group {
        flex: 1;
        min-width: 200px;
      }

      .input-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 0.9em;
      }

      .input-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-sizing: border-box; /* Garante que padding não aumente a largura */
      }

      button#btn-check {
        background-color: var(--primary-color);
        color: white;
        padding: 12px 25px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.3s;
        height: 42px; /* Alinha com os inputs */
        flex: 0 0 auto;
      }

      button#btn-check:hover {
        background-color: #1a252f;
      }

      /* Área de Resultados */
      #results-area {
        margin-top: 30px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
      }

      /* Card do Quarto */
      .room-card {
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        transition: transform 0.2s;
        display: flex;
        flex-direction: column;
      }

      .room-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
      }

      .room-image {
        height: 180px;
        background-color: #ddd;
        background-size: cover;
        background-position: center;
      }

      .room-details {
        padding: 20px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
      }

      .room-title {
        font-size: 1.25em;
        margin: 0 0 10px 0;
        color: var(--primary-color);
      }

      .room-desc {
        font-size: 0.9em;
        color: #666;
        margin-bottom: 15px;
        line-height: 1.4;
      }

      .room-meta {
        margin-top: auto;
        border-top: 1px solid #eee;
        padding-top: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .price-tag {
        font-size: 1.2em;
        font-weight: bold;
        color: var(--accent-color);
      }

      .price-label {
        font-size: 0.7em;
        color: #888;
        font-weight: normal;
      }

      .btn-book {
        background-color: var(--accent-color);
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 4px;
        cursor: pointer;
      }

      .error-msg {
        color: #e74c3c;
        text-align: center;
        width: 100%;
        margin-top: 20px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Verificar Disponibilidade</h1>

      <div class="search-box">
        <div class="input-group">
          <label for="checkin">Data de Check-in</label>
          <input type="date" id="checkin" />
        </div>
        <div class="input-group">
          <label for="checkout">Data de Check-out</label>
          <input type="date" id="checkout" />
        </div>
        <div class="input-group">
          <label for="guests">Hóspedes</label>
          <input type="number" id="guests" min="1" max="10" value="2" />
        </div>
        <button id="btn-check" onclick="buscarQuartos()">Buscar Quartos</button>
      </div>

      <div id="results-area"></div>
    </div>

    <script>
      /* --- JAVASCRIPT --- */

      // 1. Banco de Dados Simulado (Mock Data)
      // Em um sistema real, isso viria de uma API/Backend
      const hotelRooms = [
        {
          id: 1,
          name: "Suíte Standard",
          capacity: 2,
          basePrice: 150, // Preço base por noite
          image:
            "https://images.unsplash.com/photo-1611892440504-42a792e24d32?auto=format&fit=crop&w=500&q=60",
          description:
            "Quarto confortável com cama de casal e vista para o jardim.",
        },
        {
          id: 2,
          name: "Suíte Deluxe",
          capacity: 3,
          basePrice: 280,
          image:
            "https://images.unsplash.com/photo-1590490360182-c33d57733427?auto=format&fit=crop&w=500&q=60",
          description:
            "Espaço amplo, cama king size, varanda privativa e frigobar incluso.",
        },
        {
          id: 3,
          name: "Quarto Família",
          capacity: 5,
          basePrice: 400,
          image:
            "https://images.unsplash.com/photo-1566665797739-1674de7a421a?auto=format&fit=crop&w=500&q=60",
          description:
            "Ideal para famílias, com duas camas de casal e uma de solteiro.",
        },
        {
          id: 4,
          name: "Penthouse Presidencial",
          capacity: 4,
          basePrice: 950,
          image:
            "https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?auto=format&fit=crop&w=500&q=60",
          description:
            "O máximo de luxo no último andar, com jacuzzi e vista panorâmica.",
        },
      ];

      // Função Principal
      function buscarQuartos() {
        const checkinInput = document.getElementById("checkin").value;
        const checkoutInput = document.getElementById("checkout").value;
        const guests = parseInt(document.getElementById("guests").value);
        const resultsArea = document.getElementById("results-area");

        // Limpar resultados anteriores
        resultsArea.innerHTML = "";

        // Validação Simples
        if (!checkinInput || !checkoutInput) {
          exibirErro("Por favor, selecione as datas de entrada e saída.");
          return;
        }

        const date1 = new Date(checkinInput);
        const date2 = new Date(checkoutInput);

        // Calcular diferença de dias
        const diffTime = date2 - date1;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        if (diffDays <= 0) {
          exibirErro(
            "A data de check-out deve ser posterior à data de check-in."
          );
          return;
        }

        // Filtrar quartos que comportam o número de hóspedes
        const quartosDisponiveis = hotelRooms.filter(
          (room) => room.capacity >= guests
        );

        if (quartosDisponiveis.length === 0) {
          exibirErro(`Não encontramos quartos para ${guests} pessoas.`);
          return;
        }

        // Gerar HTML para cada quarto disponível
        quartosDisponiveis.forEach((room) => {
          // Lógica de Preço: Preço Base * Dias
          // (Opcional: Poderia adicionar uma taxa extra por pessoa aqui se quisesse)
          const valorTotal = room.basePrice * diffDays;

          // Formatar moeda (R$)
          const precoFormatado = valorTotal.toLocaleString("pt-BR", {
            style: "currency",
            currency: "BRL",
          });

          const card = document.createElement("div");
          card.className = "room-card";
          card.innerHTML = `
                <div class="room-image" style="background-image: url('${room.image}')"></div>
                <div class="room-details">
                    <h3 class="room-title">${room.name}</h3>
                    <p class="room-desc">${room.description}</p>
                    <p style="font-size: 0.85em; color: #555;">
                        👤 Acomoda até <strong>${room.capacity}</strong> pessoas
                    </p>
                    <div class="room-meta">
                        <div>
                            <span class="price-tag">${precoFormatado}</span>
                            <div class="price-label">Total para ${diffDays} noite(s)</div>
                        </div>
                        <button class="btn-book" onclick="alert('Reserva iniciada para: ${room.name}')">Reservar</button>
                    </div>
                </div>
            `;
          resultsArea.appendChild(card);
        });
      }

      function exibirErro(mensagem) {
        const resultsArea = document.getElementById("results-area");
        resultsArea.innerHTML = `<div class="error-msg">${mensagem}</div>`;
      }

      // Definir data mínima como hoje (UX improvement)
      const hoje = new Date().toISOString().split("T")[0];
      document.getElementById("checkin").setAttribute("min", hoje);
      document.getElementById("checkout").setAttribute("min", hoje);
    </script>
  </body>
</html>
