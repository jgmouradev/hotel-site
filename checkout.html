<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paradise Resort | Checkout</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Estilos para a animação de carregamento */
      .spinner {
        display: none;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
        margin-left: 10px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .btn-processando {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        opacity: 0.8;
        cursor: not-allowed;
      }

      .btn-processando .spinner {
        display: block;
      }
    </style>
  </head>

  <body class="checkout-page">
    <div class="container">
      <header style="text-align: center; margin: 40px 0">
        <h1 class="section-title">Finalize sua Estadia</h1>
        <p>Falta pouco para o seu momento de relaxamento no Paradise Resort.</p>
      </header>

      <div class="checkout-grid">
        <aside class="resumo-container">
          <div class="resumo-card" id="resumo-js">
            <h3>Carregando detalhes...</h3>
          </div>
        </aside>

        <section class="pagamento-container">
          <form id="form-pagamento" class="reserva-form">
            <h3>Dados do Cartão</h3>

            <div class="form-group">
              <label for="nome-cartao">Nome impresso no cartão</label>
              <input
                type="text"
                id="nome-cartao"
                placeholder="Ex: MARIA S SILVA"
                required
              />
            </div>

            <div class="form-group">
              <label for="num-cartao">Número do cartão</label>
              <input
                type="text"
                id="num-cartao"
                placeholder="0000 0000 0000 0000"
                required
              />
            </div>

            <div style="display: flex; gap: 15px">
              <div class="form-group">
                <label for="validade">Validade</label>
                <input type="text" id="validade" placeholder="MM/AA" required />
              </div>
              <div class="form-group">
                <label for="cvv">CVV</label>
                <input type="text" id="cvv" placeholder="123" required />
              </div>
            </div>

            <button
              type="submit"
              class="btn"
              id="btn-finalizar"
              style="width: 100%"
            >
              <span id="btn-text">Finalizar Reserva</span>
              <div class="spinner"></div>
            </button>

            <a
              href="index.html"
              style="
                display: block;
                text-align: center;
                margin-top: 15px;
                color: #666;
                font-size: 0.9rem;
                text-decoration: none;
              "
            >
              Cancelar e voltar
            </a>
          </form>
        </section>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const dadosSalvos = localStorage.getItem("reservaAtiva");
        const containerResumo = document.getElementById("resumo-js");
        const btnFinalizar = document.getElementById("btn-finalizar");
        const btnText = document.getElementById("btn-text");

        if (dadosSalvos) {
          const reserva = JSON.parse(dadosSalvos);
          containerResumo.innerHTML = `
              <h3 style="font-family: 'Cormorant Garamond', serif; font-size: 1.8rem;">Resumo da Reserva</h3>
              <hr style="margin: 15px 0; border: 0; border-top: 1px solid #ddd;">
              <p><strong>Quarto:</strong> ${reserva.quarto}</p>
              <p><strong>Check-in:</strong> ${reserva.checkin}</p>
              <p><strong>Check-out:</strong> ${reserva.checkout}</p>
              <p><strong>Duração:</strong> ${reserva.noites} noite(s)</p>
              <div style="background: #fdfaf3; padding: 15px; border-radius: 8px; margin-top: 20px;">
                  <span style="font-size: 0.9rem; color: #888;">Valor Total a Pagar</span>
                  <h2 style="color: #d4af37; margin: 0;">R$ ${Number(reserva.total).toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</h2>
              </div>
          `;
        } else {
          containerResumo.innerHTML = `<p>Nenhuma reserva encontrada. <a href="index.html">Volte para a página inicial.</a></p>`;
        }

        // Lógica do botão Finalizar com Animação
        document
          .getElementById("form-pagamento")
          .addEventListener("submit", (e) => {
            e.preventDefault();

            // Inicia o estado de carregamento
            btnFinalizar.classList.add("btn-processando");
            btnText.textContent = "Processando Pagamento...";
            btnFinalizar.disabled = true;

            // Simula uma espera de 3 segundos para o banco aprovar
            setTimeout(() => {
              alert(
                "Obrigado! Sua reserva no Paradise Resort foi confirmada com sucesso.",
              );
              localStorage.removeItem("reservaAtiva");
              window.location.href = "dashboard.html"; // Agora enviamos para o Dashboard!
            }, 3000);
          });
      });
    </script>
  </body>
</html>
